name: 05 Action upload artifact
on:
  push:
    branches: [main]

jobs:
    upload-artifact:
        runs-on: ubuntu-latest
        steps:
            - name: Create a file
              run: echo "Test Hola Mundo" >> test.log

            - name: Upload artifact
              uses: actions/upload-artifact@v3
              with:
                name: my-artifact
                path: test.log