name: 07 Action status jobs
on:
  push:
    branches: [main2]
jobs:
    first-job:
        runs-on: ubuntu-latest
        steps:
            - name: Read file
              run: cat file.txt

    second-job:
        if: ${{ always() }}
        runs-on: ubuntu-latest
        needs: first-job
        steps:
            - name: Notification error
              run: echo "The first job has failed, please check the logs"

